name: Build Localnet Tools

# Precompiles the "localnet-tools" asset — an umbrella tarball of suibase-owned
# localnet dev-tool binaries (today just `walrus-localnet-deploy`, from the
# ChainMovers/suibase crate rust/walrus-store, git-pinned to a walrus rev) so Suibase
# localnet can download it instead of compiling the heavy walrus/Sui graph. Mirrors
# build-suibase-daemon.yml. Independent of the suibase-daemon release pipeline (does
# NOT dispatch daemon-published / does NOT gate staging-promote). Version comes from
# triggers/localnet-tools/Cargo.toml (kept = walrus-store's crate version).

on:
  push:
    paths:
      - "triggers/localnet-tools/Cargo.toml"
      - ".github/workflows/build-localnet-tools.yml"
  workflow_dispatch:

env:
  asset_name: "localnet-tools"

permissions: write-all

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from Cargo.toml
        id: cargo_version
        run: |
          cargo_filepath="triggers/${{ env.asset_name }}/Cargo.toml"
          if [ ! -f $cargo_filepath ]; then
            echo "$cargo_filepath does not exist"
            exit 1
          fi
          cargo_version=$(grep '^version' $cargo_filepath | sed 's/version = "\(.*\)"/\1/')
          echo "cargo_version=$cargo_version" >> $GITHUB_ENV
          echo "cargo_version: $cargo_version"
          tag_name="${{ env.asset_name }}-v$cargo_version"
          echo "tag_name=$tag_name" >> $GITHUB_ENV
          echo "tag_name: $tag_name"

      - name: Ensure tag exists
        uses: actions/github-script@v9
        id: ensure_tag
        with:
          script: |
            const tag_name = "${{ env.tag_name }}";
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag_name}`,
              });
              console.log(`Tag [${tag_name}] already exists.`);
            } catch (error) {
              if (error.status === 404) {
                let sha;
                try {
                  const commitResponse = await github.rest.repos.getCommit({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: 'heads/main',
                  });
                  sha = commitResponse.data.sha;
                } catch (error) {
                  core.setFailed(`Error getting commit SHA: ${error}`);
                  return;
                }
                try {
                  const createRefResponse = await github.rest.git.createRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `refs/tags/${tag_name}`,
                    sha: sha,
                  });
                  if (createRefResponse.status >= 200 && createRefResponse.status < 300) {
                    console.log(`Tag [${tag_name}] created successfully.`);
                  } else {
                    core.setFailed(`Failed to create tag [${tag_name}]. Response: ${createRefResponse.status}`);
                    return;
                  }
                } catch (createRefError) {
                  core.setFailed(`Failed to create tag [${tag_name}]. ${createRefError}`);
                  return;
                }
              } else {
                core.setFailed(`Failed to getRef for tag [${tag_name}]. ${error}`);
                return;
              }
            }

      - name: Ensure Release exists and init release_vars
        id: release_vars
        uses: actions/github-script@v9
        with:
          script: |
            let tag_name = "${{ env.tag_name }}";
            console.log(`tag_name: ${tag_name}`);
            let upload_url;
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const release = releases.find(release => release.tag_name === tag_name);
              if (release) {
                console.log(`Release already exists for [${tag_name}]`);
                upload_url = release.upload_url;
              } else {
                const response = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag_name,
                  name: tag_name,
                  draft: true,
                  prerelease: false,
                });
                if (response.status >= 200 && response.status < 300 && response.data.upload_url) {
                  console.log(`Release created with tag [${tag_name}]`);
                  upload_url = response.data.upload_url;
                } else {
                  core.setFailed(`Failed to create release with tag [${tag_name}] Status: ${response.status}`);
                  return;
                }
              }
            } catch (error) {
              core.setFailed(`Error while listing or creating releases: ${error.message}`);
              return;
            }
            core.setOutput("upload_url", upload_url);

    outputs:
      cargo_version: ${{ env.cargo_version }}
      tag_name: ${{ env.tag_name }}
      upload_url: ${{ steps.release_vars.outputs.upload_url }}

  build-assets:
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Linux pinned to ubuntu-24.04 (NOT ubuntu-latest): glibc binaries are
        # forward-compatible only, so the build image is the MINIMUM glibc the
        # artifact requires. Pinning keeps that floor stable (24.04 = glibc 2.39)
        # instead of silently rising when GitHub bumps `ubuntu-latest`. glibc (not
        # musl) matches how MystenLabs/sui ships its own RocksDB-heavy binaries; the
        # asset suffix stays "ubuntu-x86_64" so the consumer match is unchanged.
        os: [ubuntu-24.04, macos-latest]
        include:
          - os: ubuntu-24.04
            asset-name-suffix: ubuntu-x86_64
          - os: macos-latest
            asset-name-suffix: macos-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Init asset_vars
        id: asset_vars
        uses: actions/github-script@v9
        with:
          script: |
            const tag_name = "${{ needs.prepare-release.outputs.tag_name }}";
            const asset_name = `${tag_name}-${{ matrix.asset-name-suffix }}.tgz`;
            core.setOutput("asset_name", asset_name);
            let releases;
            try {
              releases = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
            } catch (error) {
              core.setFailed(`Error fetching releases: ${error}`);
              return;
            }
            const release = releases.data.find(release => release.tag_name === tag_name);
            if (!release) {
              core.setFailed(`Release tag not found [${tag_name}]`);
              return;
            }
            const assetExists = release.assets.some(asset => asset.name === asset_name);
            core.setOutput("do_build", assetExists ? "false" : "true");

      - name: Sui/Walrus build prerequisites (Ubuntu)
        if: steps.asset_vars.outputs.do_build == 'true' && runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt-get install -y curl cmake gcc libssl-dev pkg-config libclang-dev libpq-dev build-essential

      - name: Sui/Walrus build prerequisites (macOS)
        if: steps.asset_vars.outputs.do_build == 'true' && runner.os == 'macOS'
        run: |
          command -v cmake >/dev/null 2>&1 || brew install cmake

      - name: Download Suibase
        if: steps.asset_vars.outputs.do_build == 'true'
        run: |
          # The crate (rust/walrus-store) + its vendored embedded-contracts live in
          # suibase; build straight from a checkout (no `suibase install` needed).
          # Build from the PROMOTED branch (pre-staging), not a moving `dev`, so the
          # published binary is compiled from exactly the source that staging validates
          # (mirrors build-suibase-daemon.yml).
          git clone --branch pre-staging https://github.com/ChainMovers/suibase.git $HOME/suibase

      - name: Build walrus-localnet-deploy
        if: steps.asset_vars.outputs.do_build == 'true'
        run: |
          set -euo pipefail
          asset_name="${{ steps.asset_vars.outputs.asset_name }}"
          crate_dir="$HOME/suibase/rust/walrus-store"

          # Install the toolchain pinned by the crate's rust-toolchain.toml (1.96).
          rust_channel=$(grep '^channel' "$crate_dir/rust-toolchain.toml" | sed 's/channel = "\(.*\)"/\1/')
          rustup toolchain install "$rust_channel" --profile minimal

          # GNU (glibc) target, not musl: the walrus-sui graph pulls RocksDB and
          # other native deps that do not link cleanly under musl. A glibc binary
          # is fine for a localnet dev tool. (Revisit musl/static later if needed.)
          cd "$crate_dir"
          cargo build --release --features localnet --bin walrus-localnet-deploy

          # Stage the binary where Suibase's downloader expects it (install_type=user
          # -> workdirs/common/bin), matching consts.yaml precompiled_path.
          mkdir -p "$HOME/suibase/workdirs/common/bin"
          cp "$crate_dir/target/release/walrus-localnet-deploy" "$HOME/suibase/workdirs/common/bin/walrus-localnet-deploy"

          # The binary has no --version flag (support_version_check=false on the
          # consume side), so there is no version sanity gate here. Smoke-test that
          # it at least runs its --help.
          "$HOME/suibase/workdirs/common/bin/walrus-localnet-deploy" deploy --help >/dev/null

          cd "$HOME"
          tar -czf "$asset_name" -C "$HOME" suibase/workdirs/common/bin/walrus-localnet-deploy
          test -f "$HOME/$asset_name"
          echo "Asset built: $asset_name"

      - name: Upload Asset to Release
        if: steps.asset_vars.outputs.do_build == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const asset_name = "${{ steps.asset_vars.outputs.asset_name }}";
            const upload_url = "${{ needs.prepare-release.outputs.upload_url }}";
            const assetPath = path.join(process.env.HOME, asset_name);
            const contentLength = fs.statSync(assetPath).size;
            const uploadAssetResponse = await github.rest.repos.uploadReleaseAsset({
              url: upload_url,
              headers: { 'content-type': 'application/gzip', 'content-length': contentLength },
              name: asset_name,
              data: fs.readFileSync(assetPath),
            });
            if (uploadAssetResponse.status !== 201) {
              core.setFailed(`Failed to upload ${asset_name}: ${uploadAssetResponse.status}`);
              return;
            }
            console.log(`Uploaded ${asset_name} successfully.`);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-and-publish-release:
    needs: [prepare-release, build-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Change Draft to Release when all assets present
        uses: actions/github-script@v9
        with:
          script: |
            const tag_name = "${{ needs.prepare-release.outputs.tag_name }}";
            const expectedAssets = [
              `${tag_name}-ubuntu-x86_64.tgz`,
              `${tag_name}-macos-arm64.tgz`
            ];
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(release => release.tag_name === tag_name);
            if (!release) {
              core.setFailed(`Release [${tag_name}] not found`);
              return;
            }
            const asset_names = release.assets.map(asset => asset.name);
            const allAssetsPresent = expectedAssets.every(a => asset_names.includes(a));
            if (allAssetsPresent) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                draft: false,
              });
              console.log(`Release ${tag_name} published successfully`);
            } else {
              core.setFailed(`Not all expected assets are present for ${tag_name}`);
              return;
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
