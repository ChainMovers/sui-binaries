# Reusable workflow: publish "min" (slimmed) variants of official MystenLabs
# Sui release tarballs.
#
# We do NOT rebuild anything. For each platform we:
#   (1) download the official "sui-<network>-v<ver>-<platform>.tgz" asset from
#       github.com/MystenLabs/sui,
#   (2) strip the large/unused binaries (sui-debug, sui-fork, sui-bridge,
#       sui-bridge-cli) via scripts/strip-sui-tarball.sh,
#   (3) repackage and upload as "sui-<network>-v<ver>-min-<platform>.tgz".
#
# This cuts the Linux download from ~1 GB to ~150 MB (sui-debug alone is
# ~3.3 GB uncompressed). The kept binaries are byte-identical to upstream.
#
# Release shape (mirrors this repo's site-builder convention):
#   tag    : sui-<network>-v<ver>-min          (e.g. sui-testnet-v1.73.0-min)
#   assets : <tag>-<platform>.tgz              (one per platform)
# Releases stay drafts until every expected platform asset is present.

name: Sui Min Release (common logic)

on:
  workflow_call:
    inputs:
      network:
        required: true
        type: string
        description: "Network type (mainnet, testnet or devnet)"
      version:
        required: false
        type: string
        default: ""
        description: "Optional X.Y.Z to mirror a specific version (default: latest upstream)"

env:
  # Official MystenLabs platforms. We mirror all of them so Suibase can source
  # every supported target from this repo. Processing is identical per platform
  # (untar/strip/retar), so everything runs on ubuntu regardless of target.
  PLATFORMS: "ubuntu-x86_64 ubuntu-aarch64 macos-arm64 macos-x86_64 windows-x86_64"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      upstream_tag: ${{ steps.resolve.outputs.upstream_tag }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      should_build_assets: ${{ steps.resolve.outputs.should_build_assets }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve upstream version and target release
        id: resolve
        run: |
          set -euo pipefail
          network="${{ inputs.network }}"

          version="$(scripts/get-latest-sui-version.sh "$network" "${{ inputs.version }}")"
          upstream_tag="${network}-v${version}"
          release_tag="sui-${network}-v${version}-min"
          echo "Resolved: network=$network version=$version"
          echo "  upstream_tag = $upstream_tag"
          echo "  release_tag  = $release_tag"

          echo "version=$version"           >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$upstream_tag" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag"   >> "$GITHUB_OUTPUT"

          # The upstream release must exist and carry the ubuntu-x86_64 asset,
          # otherwise there is nothing (complete) to mirror yet.
          official_asset="sui-${network}-v${version}-ubuntu-x86_64.tgz"
          if ! gh release view "$upstream_tag" --repo MystenLabs/sui \
                 --json assets -q '.assets[].name' 2>/dev/null \
                 | grep -qx "$official_asset"; then
            echo "Upstream $upstream_tag is missing $official_asset — skipping."
            echo "should_build_assets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Decide whether work is needed on our side.
          if gh release view "$release_tag" --json isDraft >/dev/null 2>&1; then
            is_draft="$(gh release view "$release_tag" --json isDraft -q '.isDraft')"
            if [ "$is_draft" = "true" ]; then
              echo "Draft $release_tag already exists — will complete missing assets."
              echo "should_build_assets=true" >> "$GITHUB_OUTPUT"
            else
              echo "$release_tag already published — nothing to do."
              echo "should_build_assets=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Creating draft release $release_tag"
            gh release create "$release_tag" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "$release_tag" \
              --notes "Slimmed (\"min\") build of MystenLabs \`$upstream_tag\` with sui-debug, sui-fork, sui-bridge and sui-bridge-cli removed. Kept binaries are byte-identical to upstream."
            echo "should_build_assets=true" >> "$GITHUB_OUTPUT"
          fi

  build-assets:
    needs: check-version
    if: ${{ needs.check-version.outputs.should_build_assets == 'true' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NETWORK: ${{ inputs.network }}
      VERSION: ${{ needs.check-version.outputs.version }}
      UPSTREAM_TAG: ${{ needs.check-version.outputs.upstream_tag }}
      RELEASE_TAG: ${{ needs.check-version.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-x86_64
          - ubuntu-aarch64
          - macos-arm64
          - macos-x86_64
          - windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Build and upload min asset for ${{ matrix.platform }}
        run: |
          set -euo pipefail
          platform="${{ matrix.platform }}"
          official_asset="sui-${NETWORK}-v${VERSION}-${platform}.tgz"
          min_asset="${RELEASE_TAG}-${platform}.tgz"
          work="${RUNNER_TEMP}/sui-min"
          mkdir -p "$work"

          # Idempotency: skip if this platform's min asset is already attached.
          if gh release view "$RELEASE_TAG" --json assets -q '.assets[].name' \
               | grep -qx "$min_asset"; then
            echo "Asset $min_asset already present — skipping."
            exit 0
          fi

          echo "==> Downloading official $official_asset from MystenLabs/sui@$UPSTREAM_TAG"
          gh release download "$UPSTREAM_TAG" --repo MystenLabs/sui \
            --pattern "$official_asset" --dir "$work" --clobber

          echo "==> Stripping -> $min_asset"
          scripts/strip-sui-tarball.sh "$work/$official_asset" "$work/$min_asset"

          # Runtime sanity check (only possible for the native runner target).
          if [ "$platform" = "ubuntu-x86_64" ]; then
            echo "==> Runtime sanity check of bundled sui binary"
            check="$work/check"; mkdir -p "$check"
            tar -xzf "$work/$min_asset" -C "$check"
            got="$("$check/sui" --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)"
            if [ "$got" != "$VERSION" ]; then
              echo "ERROR: bundled sui reports '$got', expected '$VERSION'"; exit 1
            fi
            echo "    sui --version OK ($got)"
          fi

          echo "==> Uploading $min_asset to $RELEASE_TAG"
          gh release upload "$RELEASE_TAG" "$work/$min_asset" \
            --repo "$GITHUB_REPOSITORY" --clobber

  publish-release:
    needs: [check-version, build-assets]
    # Run whenever there was work to do (new or resumed draft), and even if some
    # matrix legs failed (always()) — we only publish once everything is present.
    if: ${{ needs.check-version.outputs.should_build_assets == 'true' && always() }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NETWORK: ${{ inputs.network }}
      VERSION: ${{ needs.check-version.outputs.version }}
      RELEASE_TAG: ${{ needs.check-version.outputs.release_tag }}
    steps:
      - name: Publish when all platform assets are present
        run: |
          set -euo pipefail
          mapfile -t present < <(gh release view "$RELEASE_TAG" --json assets -q '.assets[].name')

          missing=()
          for platform in $PLATFORMS; do
            want="${RELEASE_TAG}-${platform}.tgz"
            printf '%s\n' "${present[@]}" | grep -qx "$want" || missing+=("$want")
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Not publishing yet — missing assets: ${missing[*]}"
            exit 0
          fi

          is_draft="$(gh release view "$RELEASE_TAG" --json isDraft -q '.isDraft')"
          if [ "$is_draft" = "false" ]; then
            echo "$RELEASE_TAG already published."
            exit 0
          fi

          echo "All ${RELEASE_TAG} assets present — publishing."
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false
