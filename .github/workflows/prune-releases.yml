name: Prune Old Releases

# Retention policy: keep only the most recent N releases per component
# (see scripts/prune-old-releases.sh). The install scripts always fetch the
# latest version, so a small buffer of previous versions is enough to cover
# races where a client resolved an older "latest" just before a new release.

on:
  schedule:
    # Weekly, Sunday 08:47 UTC. Picked for low GitHub Actions load: weekends are
    # the quietest days, and ~08:00 UTC is off-peak (Americas overnight, Europe
    # weekend morning, before the work week starts anywhere). The :47 minute
    # deliberately avoids the top-of-the-hour scheduling stampede (scheduled
    # jobs at :00 are the most delayed) and the repo's other staggered crons.
    # Pruning is not time-sensitive, so once a week is plenty.
    - cron: '47 8 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (list what would be deleted, delete nothing)"
        type: boolean
        default: true
      keep:
        description: "Releases to keep per component (latest + previous)"
        type: string
        default: "3"

permissions:
  contents: write

# Never let two prunes race against each other.
concurrency:
  group: prune-releases
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prune old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP: ${{ github.event.inputs.keep || '3' }}
          # Scheduled runs apply deletions. Manual runs honor the dry_run input
          # (default true), so a human can preview before deleting.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
        run: ./scripts/prune-old-releases.sh
