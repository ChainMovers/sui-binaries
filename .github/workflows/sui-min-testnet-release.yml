name: Sui Min Testnet Release

on:
  schedule:
    # Every 30 min; offset off the :00/:15/:30/:45 boundaries and staggered per network.
    - cron: "7,37 * * * *"
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
        default: ""
        description: "Optional X.Y.Z to mirror a specific version (default: latest)"

jobs:
  process-release:
    uses: ./.github/workflows/sui-min-release.yml
    with:
      network: testnet
      version: ${{ inputs.version || '' }}
    permissions:
      contents: write
    secrets: inherit
